<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operación Búnker F5</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="cabecera">
    <h1>OPERACIÓN BÚNKER F5</h1>
    <p>Resuelve el reto para escapar</p>
  </header>

  <main class="contenedor">

    <section id="pantalla-inicio" class="pantalla">
      <h2>Bienvenido/a al Búnker</h2>
      <p>Estás atrapado en el sistema. Supera el firewall para escapar.</p>
      <button id="btn-empezar">Empezar juego</button>
    </section>

    <section id="reto1" class="pantalla oculta">
      <h2>Reto 1: El Firewall</h2>
      <p>Introduce el código numérico secreto:</p>
      <input type="number" id="numeroJugador" placeholder="Escribe tu respuesta">
      <button id="btn-reto1">Comprobar</button>
      <p id="mensajeReto1" class="mensaje"></p>
    </section>

    <section id="pantalla-final" class="pantalla oculta">
      <h2>¡Has escapado!</h2>
      <p id="mensajeFinal">¡Felicidades! Has hackeado el búnker con éxito.</p>
      <button id="btn-reiniciar">Reiniciar Juego</button>
    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
