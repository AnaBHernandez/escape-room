<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Completado - Operación Búnker F5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link rel="stylesheet" href="pagina-4-5-jessica.css">
</head>
<body class="completado-body">

    <header>
        <div class="header-left">
            <span class="header-title">FACTORIA F5</span>
            <span class="header-separator">|</span>
            <span class="header-status">ESTADO DEL SISTEMA: EXITOSO</span>
        </div>
        <nav>
            <div class="nav-links">
                <img src="recursos/imagenes/icon-hud-scanning.png" alt="Monitor" class="header-icon">
                <img src="recursos/imagenes/icon-hud-chip.png" alt="Settings" class="header-icon">
            </div>
        </nav>
    </header>

    <main>
        
        <div class="side-text">OPERATOR_01 //</div>

        <div class="page-content">
        
            <div class="completado-sun"></div>

        
            <div class="badge-row">
                <span class="badge badge--green">◆ DATOS DE LA MISION #1 SINCRONIZADOS</span>
            </div>

            <div class="badge-row badge-row--right">
                <span class="badge badge--orange">● NIVEL DE AUTORIZACION 4</span>
            </div>

            <!-- Título grande -->
            <h1 class="page-hero-title completado-titulo">ESCAPE<br>COMPLETADO</h1>

            <!-- Panel de estadísticas -->
            <div class="stats-row completado-stats">
                <div class="stat-card">
                    <span class="stat-label">TIEMPO TOTAL</span>
                    <span class="stat-valor stat-timer">00:42:15</span>
                    <div class="progress-bar"><div class="progress-fill completado-fill"></div></div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">ESTADOS DEL SISTEMA</span>
                    <span class="stat-valor stat-status">ESTABILIDAD</span>
                    <span class="stat-sublabel">INTEGRIDAD DEL BUNKER: 100%</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">CARGA NEURAL</span>
                    <span class="stat-valor">14 <span class="stat-unit">CICLOS</span></span>
                </div>
            </div>

            <div class="button-container">
                <button class="button_initial" onclick="location.href='index.html'">
                REINICIAR SIMULACIÓN
            </button>
            </div>


            <p class="protocol-text">
                <span class="protocol-dot"></span>
                PROTOCOLO: REINIT_SIM_V4.2
            </p>
        </div>

        
        <div class="side-icons">
            <img src="recursos/imagenes/icon-hud-neural-link.png" alt="Neural link">
            <img src="recursos/imagenes/icon-hud-brain.png" alt="Brain">
        </div>
    </main>


</body>
</html>
